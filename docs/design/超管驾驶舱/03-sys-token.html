<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Pool管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-sys-token" class="tab-content">
        <!-- Token Status Table -->
        <div class="bg-white border border-gray-300 rounded-lg p-4 mb-6">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [Token状态表格] -->Token来源状态</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-200 text-gray-500 text-xs">
              <th class="text-left py-2 px-3">来源</th><th class="text-left py-2 px-3">状态</th><th class="text-left py-2 px-3">剩余额度</th><th class="text-left py-2 px-3">冷却时间</th><th class="text-left py-2 px-3">最后使用</th>
            </tr></thead>
            <tbody>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">智谱直连 (GLM-4)</td><td class="py-2 px-3"><span class="text-green-500">● 正常</span></td><td class="py-2 px-3">￥8,200</td><td class="py-2 px-3">—</td><td class="py-2 px-3">2分钟前</td></tr>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">中转站 (多模型)</td><td class="py-2 px-3"><span class="text-green-500">● 正常</span></td><td class="py-2 px-3">￥3,640</td><td class="py-2 px-3">—</td><td class="py-2 px-3">5分钟前</td></tr>
              <tr><td class="py-2 px-3">本地122B (Qwen3.5)</td><td class="py-2 px-3"><span class="text-yellow-500">● 高负载</span></td><td class="py-2 px-3">￥500 (电费)</td><td class="py-2 px-3">排队3个</td><td class="py-2 px-3">1分钟前</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Monthly Cost Trend -->
        <div class="bg-white border border-gray-300 rounded-lg p-4 mb-6">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [月度成本趋势] -->月度成本趋势</h3>
          <div class="flex items-end gap-1 h-32">
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-200 w-full rounded-t" style="height:60%"></div><div class="text-xs text-gray-500 mt-1">1月</div>
            </div>
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-200 w-full rounded-t" style="height:72%"></div><div class="text-xs text-gray-500 mt-1">2月</div>
            </div>
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-300 w-full rounded-t" style="height:65%"></div><div class="text-xs text-gray-500 mt-1">3月</div>
            </div>
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-400 w-full rounded-t" style="height:85%"></div><div class="text-xs text-gray-500 mt-1">4月</div>
            </div>
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-300 w-full rounded-t" style="height:78%"></div><div class="text-xs text-gray-500 mt-1">5月</div>
            </div>
            <div class="flex flex-col items-center flex-1">
              <div class="bg-blue-500 w-full rounded-t" style="height:92%"></div><div class="text-xs text-gray-500 mt-1">6月</div>
            </div>
          </div>
          <div class="text-xs text-gray-400 mt-2 text-right">单位: 千元</div>
        </div>

        <!-- Alert Rules -->
        <div class="bg-white border border-gray-300 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [告警规则配置] -->告警规则</h3>
          <div class="space-y-2">
            <div class="flex items-center justify-between border border-gray-200 rounded p-3">
              <div><span class="text-yellow-500 mr-2">⚠️</span>余额 &lt; ￥500 时触发告警</div>
              <div class="flex items-center gap-2"><span class="text-green-500 text-xs">已启用</span><button class="text-xs text-blue-500 hover:underline">编辑</button></div>
            </div>
            <div class="flex items-center justify-between border border-gray-200 rounded p-3">
              <div><span class="text-red-500 mr-2">🔴</span>连续失败 &gt; 3次自动切换来源</div>
              <div class="flex items-center gap-2"><span class="text-green-500 text-xs">已启用</span><button class="text-xs text-blue-500 hover:underline">编辑</button></div>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
