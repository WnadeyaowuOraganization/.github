<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DORA指标</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-dev-dora" class="tab-content">
        <!-- DORA Cards -->
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">部署频率</div>
            <div class="text-2xl font-bold text-green-500">3次/天</div>
            <div class="text-xs text-gray-400 mt-1">Elite (>1次/天)</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">变更前置时间</div>
            <div class="text-2xl font-bold text-yellow-500">4.2h</div>
            <div class="text-xs text-gray-400 mt-1">High (<24h)</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">变更失败率</div>
            <div class="text-2xl font-bold text-yellow-500">8%</div>
            <div class="text-xs text-gray-400 mt-1">High (<15%)</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">恢复时间</div>
            <div class="text-2xl font-bold text-green-500">45min</div>
            <div class="text-xs text-gray-400 mt-1">Elite (<1h)</div>
          </div>
        </div>

        <!-- Recent Errors -->
        <div class="bg-white border border-gray-300 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [最近错误] -->最近失败记录</h3>
          <div class="space-y-2">
            <div class="flex items-stretch gap-3 bg-red-50 border border-red-200 rounded p-3">
              <div class="alert-bar bg-red-400"></div>
              <div class="flex-1">
                <div class="font-medium text-sm">E2E Fail: D3结构风险检测</div>
                <div class="text-xs text-gray-500 mt-0.5">Issue #3468 · kimi7 · 断言失败: 风险等级字段缺失 · 2小时前</div>
              </div>
            </div>
            <div class="flex items-stretch gap-3 bg-red-50 border border-red-200 rounded p-3">
              <div class="alert-bar bg-red-400"></div>
              <div class="flex-1">
                <div class="font-medium text-sm">E2E Fail: 前端404路由不匹配</div>
                <div class="text-xs text-gray-500 mt-0.5">Issue #3472 · kimi3 · /wande/cockpit 路由未注册 · 4小时前</div>
              </div>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
