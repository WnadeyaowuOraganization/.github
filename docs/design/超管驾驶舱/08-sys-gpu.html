<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU资源监控</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-sys-gpu" class="tab-content">
        <div class="grid grid-cols-2 gap-4">
          <!-- GPU Card -->
          <div class="bg-white border border-gray-300 rounded-lg p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4"><!-- [GPU利用率] -->GPU利用率</h3>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-gray-800">Qwen3.5-122B</div>
              <div class="text-xs text-gray-400">vLLM推理引擎</div>
            </div>
            <div class="space-y-4">
              <div>
                <div class="flex justify-between text-xs mb-1"><span>GPU使用率</span><span class="font-medium">78%</span></div>
                <div class="bg-gray-100 rounded-full h-4"><div class="bg-yellow-400 h-4 rounded-full" style="width:78%"></div></div>
              </div>
              <div>
                <div class="flex justify-between text-xs mb-1"><span>显存</span><span class="font-medium">48G / 80G</span></div>
                <div class="bg-gray-100 rounded-full h-4"><div class="bg-blue-400 h-4 rounded-full" style="width:60%"></div></div>
              </div>
              <div class="flex justify-between items-center border-t border-gray-200 pt-3">
                <span class="text-xs text-gray-500">温度</span>
                <span class="text-lg font-bold text-orange-500">72°C</span>
              </div>
            </div>
          </div>

          <!-- vLLM Queue -->
          <div class="bg-white border border-gray-300 rounded-lg p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4"><!-- [vLLM并发队列] -->vLLM并发队列</h3>
            <div class="grid grid-cols-3 gap-4 mb-6">
              <div class="text-center p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                <div class="text-2xl font-bold text-yellow-600">3</div>
                <div class="text-xs text-gray-500">排队中</div>
              </div>
              <div class="text-center p-3 bg-blue-50 border border-blue-200 rounded-lg">
                <div class="text-2xl font-bold text-blue-600">2</div>
                <div class="text-xs text-gray-500">处理中</div>
              </div>
              <div class="text-center p-3 bg-green-50 border border-green-200 rounded-lg">
                <div class="text-2xl font-bold text-green-600">1,247</div>
                <div class="text-xs text-gray-500">已完成</div>
              </div>
            </div>
            <div class="text-xs text-gray-400">
              <div>平均推理延迟: 2.3s</div>
              <div>今日吞吐: 1,252 requests</div>
              <div>队列最大深度: 8 (14:20)</div>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
