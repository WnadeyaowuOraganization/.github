<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外部工具管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-sys-tools" class="tab-content">
        <div class="bg-white border border-gray-300 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [工具表格] -->外部工具列表</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-200 text-gray-500 text-xs">
              <th class="text-left py-2 px-3">名称</th><th class="text-left py-2 px-3">状态</th><th class="text-left py-2 px-3">端口</th><th class="text-left py-2 px-3">最后调用</th><th class="text-left py-2 px-3">操作</th>
            </tr></thead>
            <tbody>
              <tr class="border-b border-gray-100">
                <td class="py-2 px-3">Bing Search API</td><td class="py-2 px-3"><span class="text-green-500">● 正常</span></td><td class="py-2 px-3">—</td><td class="py-2 px-3">3分钟前</td>
                <td class="py-2 px-3"><button class="text-xs text-blue-500 hover:underline mr-2">测试</button><button class="text-xs text-red-500 hover:underline">禁用</button></td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-2 px-3">SearXNG</td><td class="py-2 px-3"><span class="text-green-500">● 正常</span></td><td class="py-2 px-3">:8888</td><td class="py-2 px-3">15分钟前</td>
                <td class="py-2 px-3"><button class="text-xs text-blue-500 hover:underline mr-2">测试</button><button class="text-xs text-red-500 hover:underline">禁用</button></td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-2 px-3">ComfyUI</td><td class="py-2 px-3"><span class="text-yellow-500">● 空闲</span></td><td class="py-2 px-3">:8188</td><td class="py-2 px-3">2小时前</td>
                <td class="py-2 px-3"><button class="text-xs text-blue-500 hover:underline mr-2">测试</button><button class="text-xs text-red-500 hover:underline">禁用</button></td>
              </tr>
              <tr>
                <td class="py-2 px-3">OnlyOffice</td><td class="py-2 px-3"><span class="text-green-500">● 正常</span></td><td class="py-2 px-3">:8443</td><td class="py-2 px-3">45分钟前</td>
                <td class="py-2 px-3"><button class="text-xs text-blue-500 hover:underline mr-2">测试</button><button class="text-xs text-red-500 hover:underline">禁用</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
</body>
</html>
