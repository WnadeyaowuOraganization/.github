<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinOps成本看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-sys-finops" class="tab-content">
        <!-- Cost Summary Cards -->
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">AI模型成本</div>
            <div class="text-2xl font-bold text-gray-800">￥8,500</div>
            <div class="text-xs text-gray-400 mt-1">占比 74.6%</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">云资源</div>
            <div class="text-2xl font-bold text-gray-800">￥2,100</div>
            <div class="text-xs text-gray-400 mt-1">占比 18.4%</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">工具SaaS</div>
            <div class="text-2xl font-bold text-gray-800">￥800</div>
            <div class="text-xs text-gray-400 mt-1">占比 7.0%</div>
          </div>
          <div class="bg-white border border-blue-300 rounded-lg p-4 bg-blue-50">
            <div class="text-blue-600 text-xs mb-1 font-medium">总计</div>
            <div class="text-2xl font-bold text-blue-600">￥11,400</div>
            <div class="text-xs text-gray-400 mt-1">预算使用 76%</div>
          </div>
        </div>

        <!-- Budget vs Actual -->
        <div class="bg-white border border-gray-300 rounded-lg p-4 mb-6">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [预算vs实际] -->预算 vs 实际</h3>
          <div class="space-y-3">
            <div>
              <div class="flex justify-between text-xs mb-1"><span class="text-gray-500">预算</span><span>￥15,000</span></div>
              <div class="bg-gray-100 rounded-full h-6"><div class="bg-gray-300 h-6 rounded-full flex items-center pl-2 text-xs text-gray-600" style="width:100%">￥15,000</div></div>
            </div>
            <div>
              <div class="flex justify-between text-xs mb-1"><span class="text-blue-500">实际</span><span>￥11,400 (76%)</span></div>
              <div class="bg-gray-100 rounded-full h-6"><div class="bg-blue-400 h-6 rounded-full flex items-center pl-2 text-xs text-white" style="width:76%">￥11,400</div></div>
            </div>
          </div>
        </div>

        <!-- Cost Detail Table -->
        <div class="bg-white border border-gray-300 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [成本明细表] -->成本明细</h3>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-200 text-gray-500 text-xs">
              <th class="text-left py-2 px-3">项目</th><th class="text-right py-2 px-3">本月</th><th class="text-right py-2 px-3">上月</th><th class="text-right py-2 px-3">环比</th>
            </tr></thead>
            <tbody>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">智谱API</td><td class="py-2 px-3 text-right">￥6,200</td><td class="py-2 px-3 text-right">￥5,800</td><td class="py-2 px-3 text-right text-red-500">+6.9%</td></tr>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">AWS EC2</td><td class="py-2 px-3 text-right">￥1,500</td><td class="py-2 px-3 text-right">￥1,500</td><td class="py-2 px-3 text-right text-gray-400">0%</td></tr>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">AWS Lightsail</td><td class="py-2 px-3 text-right">￥600</td><td class="py-2 px-3 text-right">￥600</td><td class="py-2 px-3 text-right text-gray-400">0%</td></tr>
              <tr class="border-b border-gray-100"><td class="py-2 px-3">GitHub</td><td class="py-2 px-3 text-right">￥300</td><td class="py-2 px-3 text-right">￥300</td><td class="py-2 px-3 text-right text-gray-400">0%</td></tr>
              <tr><td class="py-2 px-3">域名 (wande.ai)</td><td class="py-2 px-3 text-right">￥500</td><td class="py-2 px-3 text-right">￥500</td><td class="py-2 px-3 text-right text-gray-400">0%</td></tr>
            </tbody>
          </table>
        </div>
      </div>
</body>
</html>
