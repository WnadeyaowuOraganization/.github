<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI对话监控</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-biz-chat" class="tab-content">
        <!-- KPI Cards -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">今日对话</div>
            <div class="text-2xl font-bold text-gray-800">128<span class="text-sm font-normal text-gray-400">轮</span></div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">平均响应</div>
            <div class="text-2xl font-bold text-gray-800">2.1<span class="text-sm font-normal text-gray-400">秒</span></div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <div class="text-gray-500 text-xs mb-1">用户满意度</div>
            <div class="text-2xl font-bold text-yellow-500">4.2 ★</div>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
          <!-- Channel Distribution -->
          <div class="bg-white border border-gray-300 rounded-lg p-4">
            <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [对话来源分布] -->对话来源</h3>
            <div class="space-y-3">
              <div><div class="flex justify-between text-xs mb-1"><span>Web端</span><span>60%</span></div><div class="bg-gray-100 rounded-full h-3"><div class="bg-blue-400 h-3 rounded-full" style="width:60%"></div></div></div>
              <div><div class="flex justify-between text-xs mb-1"><span>企微</span><span>25%</span></div><div class="bg-gray-100 rounded-full h-3"><div class="bg-green-400 h-3 rounded-full" style="width:25%"></div></div></div>
              <div><div class="flex justify-between text-xs mb-1"><span>API</span><span>15%</span></div><div class="bg-gray-100 rounded-full h-3"><div class="bg-yellow-400 h-3 rounded-full" style="width:15%"></div></div></div>
            </div>
          </div>

          <!-- Recent Conversations -->
          <div class="col-span-2 bg-white border border-gray-300 rounded-lg p-4">
            <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [最近对话列表] -->最近对话</h3>
            <table class="w-full text-xs">
              <thead><tr class="border-b border-gray-200 text-gray-500">
                <th class="text-left py-1.5 px-2">时间</th><th class="text-left py-1.5 px-2">用户</th><th class="text-left py-1.5 px-2">渠道</th><th class="text-left py-1.5 px-2">首条消息</th><th class="text-left py-1.5 px-2">满意度</th>
              </tr></thead>
              <tbody>
                <tr class="border-b border-gray-100"><td class="py-1.5 px-2">14:28</td><td class="py-1.5 px-2">张经理</td><td class="py-1.5 px-2"><span class="bg-blue-100 text-blue-600 px-1 rounded">Web</span></td><td class="py-1.5 px-2 truncate max-w-[200px]">帮我查一下深圳最近的游乐设备招标...</td><td class="py-1.5 px-2 text-yellow-500">★★★★☆</td></tr>
                <tr class="border-b border-gray-100"><td class="py-1.5 px-2">14:15</td><td class="py-1.5 px-2">李工</td><td class="py-1.5 px-2"><span class="bg-green-100 text-green-600 px-1 rounded">企微</span></td><td class="py-1.5 px-2 truncate max-w-[200px]">D3参数化设计的蹦床结构怎么配置...</td><td class="py-1.5 px-2 text-yellow-500">★★★★★</td></tr>
                <tr><td class="py-1.5 px-2">13:50</td><td class="py-1.5 px-2">系统API</td><td class="py-1.5 px-2"><span class="bg-yellow-100 text-yellow-600 px-1 rounded">API</span></td><td class="py-1.5 px-2 truncate max-w-[200px]">竞品分析报告生成请求</td><td class="py-1.5 px-2 text-gray-400">—</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
</body>
</html>
