<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-dev-issue" class="tab-content">
        <div class="flex gap-3 overflow-x-auto pb-4">
          <!-- Plan -->
          <div class="min-w-[220px] flex-1 bg-gray-100 border border-gray-200 rounded-lg p-3">

              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3490</span> 数据看板重构</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3489</span> 移动端适配优化</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3488</span> 导出功能增强</div>
            </div>
          </div>
          <!-- Todo -->
          <div class="min-w-[220px] flex-1 bg-blue-50 border border-blue-200 rounded-lg p-3">

            <div class="space-y-2">

            </div>
          </div>
          <!-- In Progress -->
          <div class="min-w-[220px] flex-1 bg-yellow-50 border border-yellow-200 rounded-lg p-3">
            <div class="flex justify-between items-center mb-3"><span class="font-semibold text-yellow-600">In Progress</span><span class="bg-yellow-200 text-yellow-700 text-xs px-2 py-0.5 rounded-full">29</span></div>
            <div class="space-y-2">
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3484</span> Prompt管理页面</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3482</span> FinOps成本看板</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3481</span> 实时日志流</div>
            </div>
          </div>
          <!-- E2E Fail -->

            <div class="space-y-2">
              <div class="bg-white border border-red-200 rounded p-2 text-xs"><span class="text-gray-400">#3472</span> 前端路由404修复</div>
              <div class="bg-white border border-red-200 rounded p-2 text-xs"><span class="text-gray-400">#3468</span> D3结构风险检测</div>
            </div>
          </div>
          <!-- Done -->
          <div class="min-w-[220px] flex-1 bg-green-50 border border-green-200 rounded-lg p-3">
            <div class="flex justify-between items-center mb-3"><span class="font-semibold text-green-600">Done</span><span class="bg-green-200 text-green-700 text-xs px-2 py-0.5 rounded-full">465</span></div>
            <div class="space-y-2">
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3471</span> Smoke探活优化</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3469</span> Token刷新机制</div>
              <div class="bg-white border border-gray-200 rounded p-2 text-xs"><span class="text-gray-400">#3467</span> CC日志持久化</div>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
