<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验收队列</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sidebar-group-items { display: none; }
  .sidebar-group-items.expanded { display: block; }
  .sidebar-tab-btn.active { background-color: #eff6ff; color: #3b82f6; font-weight: 600; }
  table tbody tr:hover { background-color: #f9fafb; }
  .alert-bar { width: 4px; min-height: 100%; border-radius: 2px; }
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; margin-bottom: 4px; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .radar-bar { height: 20px; border-radius: 4px; }
  .kanban-col { min-width: 160px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  </style>
</head>
<body class="bg-gray-50 p-6">
<div id="tab-dev-accept" class="tab-content">
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white border border-gray-300 rounded-lg p-4 text-center">
            <div class="text-gray-500 text-xs mb-1">待验收</div>
            <div class="text-2xl font-bold text-yellow-500">3</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4 text-center">
            <div class="text-gray-500 text-xs mb-1">平均响应时间</div>
            <div class="text-2xl font-bold text-gray-800">2.3h</div>
          </div>
          <div class="bg-white border border-gray-300 rounded-lg p-4 text-center">
            <div class="text-gray-500 text-xs mb-1">本周验收通过</div>
            <div class="text-2xl font-bold text-green-500">17</div>
          </div>
        </div>

        <div class="bg-white border border-gray-300 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-700 mb-3"><!-- [我的待办] -->我的验收待办</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3 border border-gray-200 rounded p-3">
              <div class="alert-bar bg-red-400 self-stretch"></div>
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <span class="bg-red-100 text-red-600 text-xs px-1.5 py-0.5 rounded">紧急</span>
                  <span class="font-medium text-sm">#3470 API 404修复</span>
                </div>
                <div class="text-xs text-gray-500 mt-1">等待验收 · CC kimi1提交 · 30分钟前</div>
              </div>
              <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs hover:bg-blue-600">去验收</button>
            </div>
            <div class="flex items-center gap-3 border border-gray-200 rounded p-3">
              <div class="alert-bar bg-orange-400 self-stretch"></div>
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <span class="bg-orange-100 text-orange-600 text-xs px-1.5 py-0.5 rounded">一般</span>
                  <span class="font-medium text-sm">#3481 日志流</span>
                </div>
                <div class="text-xs text-gray-500 mt-1">待审阅 · CC kimi2提交 · 1小时前</div>
              </div>
              <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs hover:bg-blue-600">去审阅</button>
            </div>
            <div class="flex items-center gap-3 border border-gray-200 rounded p-3">
              <div class="alert-bar bg-green-400 self-stretch"></div>
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <span class="bg-green-100 text-green-600 text-xs px-1.5 py-0.5 rounded">低</span>
                  <span class="font-medium text-sm">#2849 Agent效率</span>
                </div>
                <div class="text-xs text-gray-500 mt-1">已完成待Review · CC kimi7提交 · 3小时前</div>
              </div>
              <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs hover:bg-blue-600">去Review</button>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
